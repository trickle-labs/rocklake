# RockLake Compatibility Evidence Manifest
#
# This file is the single source of truth for all compatibility claims in
# docs/compatibility.md. Every row in that document must have a corresponding
# entry here with machine-readable evidence.
#
# Statuses:
#   supported   — automated release-blocking CI job; claim is enforceable
#   expected    — non-blocking; risk documented; no CI enforcement
#   untested    — no promise made; community contributions welcome
#   unsupported — explicit rejection; version-policy check or incompatibility
#
# Fields:
#   component      — category (ducklake, duckdb, spark, trino, …)
#   name           — human-readable identifier for the row
#   version        — version or version range
#   platform       — "all" or specific platform
#   status         — one of supported | expected | untested | unsupported
#   ci_job         — GitHub Actions job ID that provides evidence (empty if N/A)
#   test_command   — cargo test command or equivalent (empty if N/A)
#   fixture_path   — path to fixture file if applicable (empty if N/A)
#   last_reviewed  — ISO-8601 date of last manual review
#   notes          — short human note

# ────────────────────────────────────────────────────────────────────────────
# DuckLake Protocol
# ────────────────────────────────────────────────────────────────────────────

[[entry]]
component = "ducklake"
name = "DuckLake v1.0 catalog format (all 28 spec tables)"
version = "1.0"
platform = "all"
status = "supported"
ci_job = "ducklake-corpus"
test_command = "cargo test -p rocklake-pgwire --test v027_10_ducklake_compat_tests"
fixture_path = "tests/fixtures/ducklake-corpus"
last_reviewed = "2026-05-29"
notes = "Catalog Version 7 / V1_0. CI runs on every push/PR."

[[entry]]
component = "ducklake"
name = "DuckLake v1.1 rejection gate"
version = "1.1"
platform = "all"
status = "unsupported"
ci_job = "ducklake-corpus"
test_command = "cargo test -p rocklake-pgwire --test v027_10_ducklake_compat_tests"
fixture_path = ""
last_reviewed = "2026-05-29"
notes = "V1_1_DEV_1 migrations are classified and never applied."

