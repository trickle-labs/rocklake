name: Sanitizers and Miri

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  asan-ubsan:
    name: ASAN + UBSAN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: x86_64-unknown-linux-gnu
      - name: Run with ASAN
        env:
          RUSTFLAGS: "-Z sanitizer=address"
          # Tombstone allocations in rocklake_close are intentionally not freed
          # (see RockLakeCatalog tombstone pattern).  Suppress LSAN to avoid
          # false-positive leak reports from the small bounded shell structs.
          LSAN_OPTIONS: detect_leaks=0
        run: cargo test -p rocklake-ffi --target x86_64-unknown-linux-gnu
      - name: Run with UBSAN
        env:
          RUSTFLAGS: "-Z ub-checks=yes"
        run: cargo test -p rocklake-ffi --target x86_64-unknown-linux-gnu

  miri:
    name: Miri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - name: Run Miri (rocklake-core key and value encode/decode)
        run: cargo miri test -p rocklake-core
